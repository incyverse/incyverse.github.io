{% assign contacts = site.links %}
<div class="contact">
    <ul class="list list-reset">
        {% for contact in contacts %}
        <li class="item">
            <i class="{{ contact.icon }}"></i>
            <a href="{{ contact.url }}" class="link" target="_blank">
                {{ contact.label }}
            </a>
        </li>
        {% endfor %}
    </ul>
</div>
